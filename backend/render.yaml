services:
  - type: web
    name: zhujiang-ai-backend
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:./dev.db
      - key: CHROMA_COLLECTION
        value: campus_knowledge
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://YOUR_VERCEL_URL.vercel.app
